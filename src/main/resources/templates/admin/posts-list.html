<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container mt-4">
        <h2 th:text="${currentCategory == 'news' ? 'Новости' : (currentCategory == 'video' ? 'Видео' : 'История команды')}"></h2>

        <a th:href="@{/admin/posts/add(category=${currentCategory})}" class="btn btn-success mb-3">+ Добавить</a>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Заголовок</th>
                <th>Категория</th>
                <th>Дата создания</th>
                <th th:if="${currentCategory == 'history'}">Порядок</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${posts}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.title}">Заголовок</td>
                <td th:text="${p.category}">news</td>
                <td th:text="${#temporals.format(p.createdDate, 'dd.MM.yyyy HH:mm')}">-</td>
                <td th:if="${currentCategory == 'history'}" th:text="${p.displayOrder}">1</td>
                <td>
                    <a th:href="@{/admin/posts/edit/{id}(id=${p.id})}" class="btn btn-sm btn-primary">Ред.</a>
                    <a th:href="@{/admin/posts/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
                    <a th:if="${currentCategory == 'history'}" th:href="@{/admin/posts/history/moveUp/{id}(id=${p.id})}" class="btn btn-sm btn-secondary">↑</a>
                    <a th:if="${currentCategory == 'history'}" th:href="@{/admin/posts/history/moveDown/{id}(id=${p.id})}" class="btn btn-sm btn-secondary">↓</a>
                </td>
            </tr>
            <tr th:if="${posts.isEmpty()}">
                <td colspan="6" class="text-center">Нет записей</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
