<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container mt-4">
        <h2>Управление игроками</h2>
        <a href="/admin/players/add" class="btn btn-success mb-3">+ Добавить игрока</a>
        <table class="table table-bordered">
            <thead class="table-dark">
            <tr><th>ID</th><th>Имя</th><th>Фамилия</th><th>Номер</th><th>Позиция</th><th>Состав</th><th>Действия</th></tr>
            </thead>
            <tbody>
            <tr th:each="p : ${players}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.firstName}">Иван</td>
                <td th:text="${p.lastName}">Иванов</td>
                <td th:text="${p.number}">7</td>
                <td th:text="${p.position}">Нападающий</td>
                <td th:text="${p.teamType}">1</td>
                <td>
                    <a th:href="@{/admin/players/edit/{id}(id=${p.id})}" class="btn btn-sm btn-primary">Редактировать</a>
                    <a th:href="@{/admin/players/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
